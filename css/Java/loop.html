<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="card-body w-50 m-auto">
        <h1>Enter Number of loop</h1>
        <input type="text" id="num" class="w-50 fs-4 rounded-4 ps-3 "><br>
        <button class="btn bg-info text-warning-emphasis fs-4 fw-bold mt-3" type="button" onclick="loop()">Submit</button>
    </div>
    <div class="w-25 shadow m-auto card overflow-hidden">
        <p class="object-fit-cover text-black " id="loop"></p>
    </div>
    <script>
        function loop(){
            let num=Number(document.getElementById("num").value);
            let write ="";
            let sum=0;
            for(let i=1 ;i<=num;i++){
                write += i+"+";
                sum+=i;
                 document.getElementById("loop").innerHTML= write + "="+sum;
            }
            
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
