<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let Name , Id ,score1 , score2 ,score3, score4, score5, score6 ,score7 ;
        Name=prompt("Input name:")
        Id=prompt("Input id:")
        score1=Number(prompt("Input score1:"));
        score2=Number(prompt("Input score2:"));
        score3=Number(prompt("Input score3:"));
        score4=Number(prompt("Input score4:"));
        score5=Number(prompt("Input score5:"));
        score6=Number(prompt("Input score6:"));
        score7=Number(prompt("Input score7:"));
        document.write("Name:" + Name +"<br>");
        document.write("Id:" + Id +"<br>");
        document.write("score1 =" + score1+"<br>");
        document.write("score2 =" + score2+"<br>");
        document.write("score3 =" + score3+"<br>");
        document.write("score4 =" + score4+"<br>");
        document.write("score5 =" + score5+"<br>");
        document.write("score6 =" + score6+"<br>");
        document.write("score7 =" + score7+"<br>");
        document.write("Total scores =" + (score1+score2+score3+score4+score5+score6+score7)+"<br>");
        document.write("Average =" + ((score1+score2+score3+score4+score5+score6+score7)/7)+"<br>");
    </script>
</body>
</html>
