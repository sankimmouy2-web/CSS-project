<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
    <form class="card shadow-lg m-auto w-50 p-5 border">
        <h1 class="fw-bold text-danger">Enter Your Information</h1>
        <div class="row">
            <div class="col col-lg-6">
                <label for="" class="text-black fs-4">ឈ្មោះ</label>
                <input type="text" id="name" class="mb-3 w-100 border-1 rounded-2"><br>
            </div>
            <div class="col col-lg-6">
                <label for="" class="text-black fs-4">លេខរៀង</label>
                <input type="text" id="name" class="mb-3 w-100 border-1 rounded-2"><br>
            </div>
        </div>
        <div class="row">
            <div class="col col-lg-6">
                <label for="" class="text-black fs-4">លេខបន្ទប់</label>
                <input type="text" id="name" class="mb-3 w-100 border-1 rounded-2"><br>
            </div>
            <div class="col col-lg-6">
                <label for="" class="text-black fs-4">ឆ្នាំ</label>
                <input type="text" id="name" class="mb-3 w-100 border-1 rounded-2"><br>
            </div>
        </div>
        <div class="row">
            <div class="col col-lg-6">
                <label for="" class="text-black fs-4">HTML</label>
                <input type="text" id="name" class="mb-3 w-100 border-1 rounded-2"><br>
            </div>
            <div class="col col-lg-6">
                <label for="" class="text-black fs-4">CSS</label>
                <input type="text" id="name" class="mb-3 w-100 border-1 rounded-2"><br>
            </div>
        </div>
        <div class="row">
            <div class="col col-lg-6">
                <label for="" class="text-black fs-4">bootstrap</label>
                <input type="text" id="name" class="mb-3 w-100 border-1 rounded-2"><br>
            </div>
            <div class="col col-lg-6">
                <label for="" class="text-black fs-4">Javascript</label>
                <input type="text" id="name" class="mb-3 w-100 border-1 rounded-2"><br>
            </div>
        </div>
        <div class="d-flex justify-content-center align-content-center">
            <button type="button" class="rounded-4 bg-danger btn p-3 g-4">Submit</button>
            <button type="reset" class="bg-warning rounded-4 btn">Reset</button>
        </div>
    </form>
    <div class="container p-3 rounded-3 bg-white">
        <div>
            <h1>ឈ្មោះសិស្ស​ <strong class="text-danger"> ${name} </strong>ឆ្នាំទី​​<strong class="text-danger">${year}</strong> បន្ទប់ <strong class="text-danger">${room}</strong></h1>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
